version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: portfolio_app_1
    ports:
      - "80:80"
      - "444:443"
    volumes:
      - .:/var/www/html
    depends_on:
      - db
    networks:
      - portfolio

  db:
    image: mysql:8.0
    container_name: portfolio_db_1
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: secret
      MYSQL_DATABASE: portfolio
      MYSQL_USER: ozaswei
      MYSQL_PASSWORD: secret
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - portfolio

volumes:
  db_data:

networks:
  portfolio:
