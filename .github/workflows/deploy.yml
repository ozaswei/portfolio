name: Deploy Laravel App

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
      SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Remove non-deployable Laravel directories
        run: |
          rm -rf storage bootstrap/cache node_modules vendor

      - name: Upload project to remote server
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ env.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          source: "./"
          target: "/home/ubuntu/portfolio/"
          rm: false
          overwrite: true
          strip_components: 0
          tar_dereference: false
          tar_exec: tar

      - name: Configure and deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.REMOTE_HOST }}
          username: ubuntu
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            set -e
            cd /home/ubuntu/portfolio

            # Write fresh .env file
            cat > .env <<EOL
APP_NAME=Portfolio
APP_ENV=production
APP_KEY=base64:hLGMskNsatrHfPHCgmiseOzqHZmtP2ZQMNVGdDhvzHQ=
APP_DEBUG=false
APP_URL=https://ozaswei.com.np

LOG_CHANNEL=stack
LOG_LEVEL=error

DB_CONNECTION=mysql
DB_HOST=db
DB_PORT=3306
DB_DATABASE=portfolio
DB_USERNAME=ozaswei
DB_PASSWORD=secret

SESSION_DRIVER=database
SESSION_LIFETIME=120

CACHE_DRIVER=file
QUEUE_CONNECTION=sync
FILESYSTEM_DISK=local

SERPAPI_KEY=${{ env.SERPAPI_KEY }}
EOL

            # Laravel writable dirs & permissions
            mkdir -p storage/framework/{cache,data,sessions,views} storage/logs bootstrap/cache
            chmod -R ug+rwX storage bootstrap/cache
            chown -R www-data:www-data storage bootstrap/cache || true

            # Docker build and run
            docker-compose down
            docker-compose up -d --build

            # Laravel setup
            docker-compose exec app composer install --no-dev --optimize-autoloader --no-interaction
            docker-compose exec app php artisan config:clear
            docker-compose exec app php artisan config:cache
            docker-compose exec app php artisan key:generate --force
            docker-compose exec app php artisan migrate --force || true
